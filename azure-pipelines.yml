trigger:
  branches:
    include:
      - main

pool:
  name: 'MyLocalAgent'

steps:
# 1. Diagnostic Health Check
- script: |
    echo "Current user: $(whoami)"
    echo "Current directory: $(pwd)"
    git --version
    node -v
  displayName: 'System Health Check'
  condition: always()

# 2. Environment Setup
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# 3. Install Dependencies
- script: |
    npm ci
  displayName: 'Clean Install Dependencies'

# 4. Browser Setup
- script: |
    npx playwright install --with-deps
  displayName: 'Install Playwright Browsers & System Deps'

# 5. Execution
- script: |
    npx playwright test
  displayName: 'Run Playwright Tests'
  env:
    CI: 'true'

# 6. Artifact Upload
- task: PublishPipelineArtifact@1
  displayName: 'Publish Playwright HTML Report'
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/playwright-report'
    artifact: 'Playwright-Results'
    publishLocation: 'pipeline'